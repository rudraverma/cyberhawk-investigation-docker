services:

  cyberhawk-ui:
    build:
      context: ./cyberhawk-ui
      dockerfile: Dockerfile
    container_name: cyberhawk-ui
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      cyberhawk-api:
        condition: service_healthy
    networks:
      - cyberhawk-net

  cyberhawk-api:
    build:
      context: ./cyberhawk-api
      dockerfile: Dockerfile
    container_name: cyberhawk-api
    restart: unless-stopped
    ports:
      - "3002:8000"
    volumes:
      - cyberhawk-data:/workspace
      - ./skills:/workspace/.agents/skills:ro
      - ./workspace/config:/workspace/config
      - ./cyberhawk-api/app:/app/app
      - /var/run/docker.sock:/var/run/docker.sock:ro   # Docker CLI — for Thug via docker exec
    env_file:
      - .env
    environment:
      - WORKSPACE=/workspace
      - MITM_PROXY=${MITM_PROXY:-http://ch-ether-proxy:8095}
      - DEOBFUSCATOR_URL=${DEOBFUSCATOR_URL:-http://cyberhawk-deobfuscator:3020/deobfuscate}
      - ETHERHAWK_WEBHOOK_URL=${ETHERHAWK_WEBHOOK_URL:-http://ch-ether-api:8094/webhook/etherhiding-confirmed}
      - ETHERHAWK_WEBHOOK_SECRET=${ETHERHAWK_WEBHOOK_SECRET:-}
      - REMNUX_CONTAINER=cyberhawk-sift-remnux          # for Thug docker exec
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cyberhawk-net

  # ── Specialist containers ────────────────────────────────────
  # All mount cyberhawk-data:/workspace to share evidence + cases

  sift-remnux:
    # REMnux malware analysis suite + FastMCP bridge for Claude Code
    # Base: remnux/remnux-distro:noble (Ubuntu 24.04)
    # Tools: Ghidra, capa, FLOSS, Speakeasy, radare2, Volatility3, apktool, jadx, YARA, Thug
    # MCP endpoint: http://<server-ip>:3004/mcp
    build:
      context: ./sift-remnux
      dockerfile: Dockerfile
    container_name: cyberhawk-sift-remnux
    restart: unless-stopped
    ports:
      - "3004:3004"   # REMnux MCP — Claude Code connects here
    volumes:
      - cyberhawk-data:/workspace
    environment:
      - REMNUX_MCP_PORT=3004
    cap_add:
      - SYS_ADMIN
      - MKNOD
    privileged: true
    devices:
      - "/dev/fuse:/dev/fuse"
    networks:
      - cyberhawk-net

  cracking:
    # hashcat v7.1.1 (CPU/POCL) + John the Ripper — for locked evidence
    build:
      context: ./cracking
      dockerfile: Dockerfile
    container_name: cyberhawk-cracking
    restart: unless-stopped
    volumes:
      - cyberhawk-data:/workspace
    networks:
      - cyberhawk-net
    # GPU passthrough (NVIDIA) — uncomment when nvidia-container-toolkit installed:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  crypto-email:
    # GPG + email forensics — eml analysis, mpack, swaks, OpenSSL
    build:
      context: ./crypto-email
      dockerfile: Dockerfile
    container_name: cyberhawk-crypto-email
    restart: unless-stopped
    volumes:
      - cyberhawk-data:/workspace
    networks:
      - cyberhawk-net

  kali:
    # Pentesting tools — ON-DEMAND ONLY (secondary to forensics mission)
    # Start with: docker compose --profile pentest up -d kali
    profiles: ["pentest"]
    build:
      context: ./kali
      dockerfile: Dockerfile
    container_name: cyberhawk-kali
    restart: unless-stopped
    volumes:
      - cyberhawk-data:/workspace
    networks:
      - cyberhawk-net

  ghidra:
    # GhidraMCP — AI-controlled reverse engineering via MCP
    # Exposes 27 Ghidra tools (decompile, disassemble, rename, xrefs, etc.) to Claude Code
    # ON-DEMAND: docker compose --profile reverse-eng up -d ghidra
    # MCP SSE endpoint: http://<server-ip>:8083/sse
    profiles: ["reverse-eng-retired"]
    build:
      context: ./cyberhawk-ghidra
      dockerfile: Dockerfile
    container_name: cyberhawk-ghidra
    restart: unless-stopped
    shm_size: '2gb'
    ports:
      - "8083:8081"   # MCP SSE bridge — Claude Code connects here
    volumes:
      - cyberhawk-data:/workspace
    environment:
      - MAXMEM=4G     # Ghidra JVM heap (increase for large binaries)
    networks:
      - cyberhawk-net

volumes:
  cyberhawk-data:
    driver: local

networks:
  cyberhawk-net:
    driver: bridge
