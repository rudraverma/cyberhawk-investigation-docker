server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SSE streams — investigation live logs (MUST come before /api/ block)
    # proxy_buffering off is critical: without it nginx buffers the whole response
    # and logs only appear all at once at the end instead of streaming live.
    location ~ ^/api/investigate/.*/stream$ {
        proxy_pass         http://cyberhawk-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        add_header         X-Accel-Buffering no;
    }

    # API proxy → cyberhawk-api
    location /api/ {
        proxy_pass         http://cyberhawk-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 500M;
    }

    # WebSocket proxy (terminal + skill runner)
    location /api/terminal/ws {
        proxy_pass         http://cyberhawk-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    location /api/skills/run {
        proxy_pass         http://cyberhawk-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
